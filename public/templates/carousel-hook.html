<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1080px; height: 1080px;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, var(--bg-start, #1e1b4b), var(--bg-end, #312e81));
    font-family: 'Inter', -apple-system, sans-serif;
    overflow: hidden;
  }
  .slide {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 80px;
    position: relative;
  }
  /* Decorative top bar */
  .accent-bar {
    position: absolute; top: 0; left: 0; right: 0;
    height: 6px;
    background: rgba(255,255,255,0.2);
  }
  .text {
    font-size: 68px; font-weight: 900; color: white;
    text-align: center; line-height: 1.1;
    letter-spacing: -1px;
    text-shadow: 0 2px 40px rgba(0,0,0,0.3);
  }
  .text em {
    font-style: normal;
    color: rgba(255,255,255,0.7);
    font-size: 52px;
    font-weight: 700;
    display: block;
    margin-top: 16px;
  }
  .slide-num {
    position: absolute; top: 40px; left: 48px;
    font-size: 20px; font-weight: 700; color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
  }
  .handle {
    position: absolute; bottom: 44px; right: 48px;
    font-size: 20px; font-weight: 700; color: rgba(255,255,255,0.5);
    letter-spacing: 0.5px;
  }
  /* Swipe indicator */
  .swipe {
    position: absolute; bottom: 44px; left: 48px;
    font-size: 16px; color: rgba(255,255,255,0.35);
    display: flex; align-items: center; gap: 6px;
  }
  .swipe::after { content: '→'; font-size: 20px; }
</style>
</head>
<body>
<div class="slide">
  <div class="accent-bar"></div>
  <div class="slide-num" id="slide-num">1/5</div>
  <div class="text" id="slide-text">O hospital estava saudável no papel.<em>Não estava.</em></div>
  <div class="swipe">deslize</div>
  <div class="handle" id="handle">@tiagomiolo</div>
</div>
</body>
</html>
