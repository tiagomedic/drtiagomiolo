<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1200px;
    height: 630px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--bg-start, #1e1b4b), var(--bg-end, #312e81));
    overflow: hidden;
  }
  .card {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    padding: 72px 80px;
    position: relative;
  }
  .quote-mark {
    font-family: 'Inter', sans-serif;
    font-size: 120px;
    font-weight: 900;
    color: rgba(255,255,255,0.15);
    line-height: 1;
    margin-bottom: -20px;
  }
  .quote-text {
    font-family: 'Inter', sans-serif;
    font-size: 44px;
    font-weight: 700;
    color: white;
    line-height: 1.3;
    max-width: 900px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.2);
  }
  .author {
    margin-top: 40px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .author-avatar {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 900;
    color: white;
  }
  .author-info {
    display: flex;
    flex-direction: column;
  }
  .author-name {
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: white;
  }
  .author-title {
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 400;
    color: rgba(255,255,255,0.6);
    margin-top: 2px;
  }
  .handle {
    position: absolute;
    bottom: 36px;
    right: 48px;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    color: rgba(255,255,255,0.4);
  }
</style>
</head>
<body>
  <div class="card">
    <div class="quote-mark">"</div>
    <div class="quote-text" id="quote-text">O hospital estava saudável no papel. Não estava.</div>
    <div class="author">
      <div class="author-avatar">TM</div>
      <div class="author-info">
        <div class="author-name">Tiago Miolo</div>
        <div class="author-title">Cirurgião Plástico · CEO StaiDoc · Gestor HMC</div>
      </div>
    </div>
    <div class="handle">@tiagomiolo</div>
  </div>
</body>
</html>
