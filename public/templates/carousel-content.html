<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1080px; height: 1080px;
    display: flex; align-items: center; justify-content: center;
    background: #0f0f18;
    font-family: 'Inter', -apple-system, sans-serif;
    overflow: hidden;
  }
  .slide {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 80px;
    position: relative;
    border-left: 8px solid var(--accent, #6366f1);
  }
  .slide-num {
    font-size: 18px; font-weight: 700;
    color: var(--accent, #6366f1);
    letter-spacing: 1px;
    margin-bottom: 32px;
  }
  .text {
    font-size: 48px; font-weight: 700; color: #ffffff;
    line-height: 1.25;
    letter-spacing: -0.5px;
  }
  .text strong {
    color: var(--accent, #6366f1);
  }
  .subtext {
    font-size: 30px; font-weight: 400; color: rgba(255,255,255,0.5);
    line-height: 1.5;
    margin-top: 24px;
  }
  .handle {
    position: absolute; bottom: 44px; right: 48px;
    font-size: 18px; font-weight: 600; color: rgba(255,255,255,0.3);
  }
  /* Subtle grid texture */
  .grid-bg {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="grid-bg"></div>
  <div class="slide-num" id="slide-num">2/5</div>
  <div class="text" id="slide-text">R$80k/mês em glosas.<br><span class="subtext">Ninguém havia mapeado.</span></div>
  <div class="handle" id="handle">@tiagomiolo</div>
</div>
</body>
</html>
