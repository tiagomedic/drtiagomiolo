<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1080px; height: 1080px;
    display: flex; align-items: center; justify-content: center;
    background: var(--accent, #6366f1);
    font-family: 'Inter', -apple-system, sans-serif;
    overflow: hidden;
  }
  .slide {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 80px;
    position: relative;
    text-align: center;
  }
  .emoji { font-size: 64px; margin-bottom: 28px; }
  .headline {
    font-size: 52px; font-weight: 900; color: white;
    line-height: 1.1; letter-spacing: -1px;
    margin-bottom: 20px;
  }
  .sub {
    font-size: 28px; font-weight: 400; color: rgba(255,255,255,0.75);
    line-height: 1.4; margin-bottom: 40px;
  }
  .url-box {
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 16px;
    padding: 16px 32px;
    font-size: 28px; font-weight: 700; color: white;
    letter-spacing: 0.5px;
  }
  .slide-num {
    position: absolute; top: 40px; left: 48px;
    font-size: 18px; font-weight: 700; color: rgba(255,255,255,0.5);
  }
  .handle {
    position: absolute; bottom: 44px; right: 48px;
    font-size: 18px; font-weight: 600; color: rgba(255,255,255,0.5);
  }
  /* Decorative circles */
  .circle-1 {
    position: absolute; top: -100px; right: -100px;
    width: 400px; height: 400px; border-radius: 50%;
    background: rgba(255,255,255,0.06);
  }
  .circle-2 {
    position: absolute; bottom: -120px; left: -80px;
    width: 300px; height: 300px; border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
</style>
</head>
<body>
<div class="slide">
  <div class="circle-1"></div>
  <div class="circle-2"></div>
  <div class="slide-num" id="slide-num">5/5</div>
  <div class="emoji">📧</div>
  <div class="headline" id="headline">Leia a história completa</div>
  <div class="sub" id="sub">Newsletter semanal sobre medicina, tecnologia e gestão</div>
  <div class="url-box" id="url">tiagomiolo.com</div>
  <div class="handle" id="handle">@tiagomiolo</div>
</div>
</body>
</html>
